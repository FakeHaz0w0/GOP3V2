name: Discord Bot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system dependencies
        run: sudo apt-get install -y libgl1 libglib2.0-0

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install Python dependencies
        run: pip install discord.py aiohttp nudenet onnxruntime supabase

      - name: Install Node.js dependencies
        run: npm install

      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.DISCORD_TOKEN }}" ]; then echo "ERROR: DISCORD_TOKEN not set"; exit 1; fi
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then echo "ERROR: SUPABASE_URL not set"; exit 1; fi
          if [ -z "${{ secrets.SUPABASE_KEY }}" ]; then echo "ERROR: SUPABASE_KEY not set"; exit 1; fi
          echo "✅ All secrets detected."

      - name: Run bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python bot.py
